name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ----- Static checks: run first, fail fast --------------------------------
  xref:
    name: XRef
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3.25.0'
      - uses: actions/cache@v5
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: build-ubuntu-24.04-otp-28-${{ hashFiles('rebar.lock', 'c_src/llama.cpp/CMakeLists.txt') }}
          restore-keys: |
            build-ubuntu-24.04-otp-28-
      - name: Run XRef
        run: rebar3 xref

  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3.25.0'
      - name: Restore PLT cache
        uses: actions/cache@v5
        with:
          path: |
            _build/*_plt
            _build/*/rebar3_*_plt
            ~/.cache/rebar3
          key: plt-otp-28-${{ hashFiles('rebar.lock') }}
          restore-keys: |
            plt-otp-28-
      - name: Run Dialyzer
        run: rebar3 dialyzer

  format:
    name: erlfmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3.25.0'
      - name: Run erlfmt --check
        run: rebar3 fmt --check

  lint:
    name: Elvis lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3.25.0'
      - name: Run Elvis
        run: rebar3 lint

  # ----- Build + tests: gated on the static checks --------------------------
  build:
    name: Build OTP ${{ matrix.otp }} on ${{ matrix.os }}
    needs: [xref, dialyzer, format, lint]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-13, macos-14]
        otp: ['28']

    steps:
      - uses: actions/checkout@v5

      - name: Set up Erlang
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: '3.25.0'

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: build-${{ matrix.os }}-otp-${{ matrix.otp }}-${{ hashFiles('rebar.lock', 'c_src/llama.cpp/CMakeLists.txt') }}
          restore-keys: |
            build-${{ matrix.os }}-otp-${{ matrix.otp }}-

      - name: Compile
        run: rebar3 compile

  eunit:
    name: EUnit OTP ${{ matrix.otp }} on ${{ matrix.os }}
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-13, macos-14]
        otp: ['28']

    steps:
      - uses: actions/checkout@v5

      - name: Set up Erlang
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: '3.25.0'

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: build-${{ matrix.os }}-otp-${{ matrix.otp }}-${{ hashFiles('rebar.lock', 'c_src/llama.cpp/CMakeLists.txt') }}
          restore-keys: |
            build-${{ matrix.os }}-otp-${{ matrix.otp }}-

      - name: Run EUnit
        run: rebar3 eunit

  proper:
    name: PropEr
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3.25.0'
      - uses: actions/cache@v5
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: build-ubuntu-24.04-otp-28-${{ hashFiles('rebar.lock', 'c_src/llama.cpp/CMakeLists.txt') }}
          restore-keys: |
            build-ubuntu-24.04-otp-28-
      - name: Run PropEr
        run: rebar3 proper

  ct:
    name: Common Test
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3.25.0'
      - uses: actions/cache@v5
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: build-ubuntu-24.04-otp-28-${{ hashFiles('rebar.lock', 'c_src/llama.cpp/CMakeLists.txt') }}
          restore-keys: |
            build-ubuntu-24.04-otp-28-
      - name: Run Common Test
        run: rebar3 ct

  freebsd:
    name: FreeBSD ${{ matrix.release }}
    needs: [xref, dialyzer, format, lint]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        release: ['14.2', '14.4']
    steps:
      - uses: actions/checkout@v5
      - name: Build + test in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: ${{ matrix.release }}
          usesh: true
          prepare: |
            # Refresh pcre2 first: the cached VM image ships an older
            # libpcre2 than the `git` package in the latest repo
            # expects (otherwise git fails with PCRE2_10.47 not
            # defined, which breaks rebar3 git deps).
            pkg install -y pcre2
            # The base `erlang` package on FreeBSD lags upstream
            # (26.x as of 14.4); we require OTP >= 28. Use the
            # per-major runtime package; its binaries live under
            # /usr/local/lib/erlang28/bin.
            pkg install -y erlang-runtime28 cmake bash gmake git
          run: |
            set -e
            export PATH="/usr/local/lib/erlang28/bin:/usr/local/bin:$PATH"
            export ERL_CRASH_DUMP_SECONDS=0
            # The host's safe.directory config is not visible inside
            # the VM; rebar3's git deps (or any build hook that
            # touches git) would hit "dubious ownership" otherwise.
            git config --global --add safe.directory "$GITHUB_WORKSPACE"
            erl -eval 'io:format("OTP ~s~n", [erlang:system_info(otp_release)]), halt().' -noshell
            fetch https://github.com/erlang/rebar3/releases/download/3.25.0/rebar3 -o rebar3
            chmod +x rebar3

            # Build, then static analysis at the same gate level as
            # erlfmt + elvis on the Linux jobs: must pass before
            # eunit. Per-module eunit follows so a BEAM segfault on
            # one module does not contaminate the others.
            ./rebar3 compile
            ./rebar3 xref
            ./rebar3 dialyzer

            FAILED=""
            for m in $(ls test/*_tests.erl | sed 's|test/||;s|\.erl||'); do
              echo "=== eunit: $m ==="
              if ! ./rebar3 eunit --module=$m; then
                FAILED="$FAILED $m"
              fi
            done

            if [ -n "$FAILED" ]; then
              echo "EUnit failures on FreeBSD:$FAILED"
              exit 1
            fi
