name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build OTP ${{ matrix.otp }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-13, macos-14]
        otp: ['28']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: '3.25.0'

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: build-${{ matrix.os }}-otp-${{ matrix.otp }}-${{ hashFiles('rebar.lock', 'c_src/llama.cpp/CMakeLists.txt') }}
          restore-keys: |
            build-${{ matrix.os }}-otp-${{ matrix.otp }}-

      - name: Compile
        run: rebar3 compile

  eunit:
    name: EUnit OTP ${{ matrix.otp }} on ${{ matrix.os }}
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-13, macos-14]
        otp: ['28']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: '3.25.0'

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: build-${{ matrix.os }}-otp-${{ matrix.otp }}-${{ hashFiles('rebar.lock', 'c_src/llama.cpp/CMakeLists.txt') }}
          restore-keys: |
            build-${{ matrix.os }}-otp-${{ matrix.otp }}-

      - name: Run EUnit
        run: rebar3 eunit

  proper:
    name: PropEr
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3.25.0'
      - uses: actions/cache@v4
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: build-ubuntu-24.04-otp-28-${{ hashFiles('rebar.lock', 'c_src/llama.cpp/CMakeLists.txt') }}
          restore-keys: |
            build-ubuntu-24.04-otp-28-
      - name: Run PropEr
        run: rebar3 proper

  ct:
    name: Common Test
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3.25.0'
      - uses: actions/cache@v4
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: build-ubuntu-24.04-otp-28-${{ hashFiles('rebar.lock', 'c_src/llama.cpp/CMakeLists.txt') }}
          restore-keys: |
            build-ubuntu-24.04-otp-28-
      - name: Run Common Test
        run: rebar3 ct

  freebsd:
    name: FreeBSD
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build + test in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: '14.4'
          usesh: true
          prepare: |
            # The base `erlang` package on FreeBSD lags upstream
            # (26.x as of 14.4); we require OTP >= 28. The ports
            # tree ships per-major runtime packages — use the 28
            # runtime directly. /usr/local/lib/erlang28/bin is its
            # binaries dir; prepend to PATH.
            pkg install -y erlang-runtime28 cmake bash gmake
          run: |
            set -e
            export PATH="/usr/local/lib/erlang28/bin:/usr/local/bin:$PATH"
            export ERL_CRASH_DUMP_SECONDS=0
            erl -eval 'io:format("OTP ~s~n", [erlang:system_info(otp_release)]), halt().' -noshell
            fetch https://github.com/erlang/rebar3/releases/download/3.25.0/rebar3 -o rebar3
            chmod +x rebar3

            ./rebar3 compile

            # Run each EUnit module in isolation. A segfault in BEAM
            # teardown on one module does not contaminate the next,
            # and a per-module failure points at the culprit.
            FAILED=""
            for m in $(ls test/*_tests.erl | sed 's|test/||;s|\.erl||'); do
              echo "=== eunit: $m ==="
              if ! ./rebar3 eunit --module=$m; then
                FAILED="$FAILED $m"
              fi
            done

            ./rebar3 xref
            ./rebar3 dialyzer

            if [ -n "$FAILED" ]; then
              echo "EUnit failures on FreeBSD:$FAILED"
              exit 1
            fi

  dialyzer:
    name: Dialyzer
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3.25.0'
      - name: Restore PLT cache
        uses: actions/cache@v4
        with:
          path: |
            _build/*_plt
            _build/*/rebar3_*_plt
            ~/.cache/rebar3
          key: plt-otp-28-${{ hashFiles('rebar.lock') }}
          restore-keys: |
            plt-otp-28-
      - name: Run Dialyzer
        run: rebar3 dialyzer

  format:
    name: erlfmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3.25.0'
      - name: Run erlfmt --check
        run: rebar3 fmt --check

  lint:
    name: Elvis lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3.25.0'
      - name: Run Elvis
        run: rebar3 lint

  xref:
    name: XRef
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3.25.0'
      - uses: actions/cache@v4
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: build-ubuntu-24.04-otp-28-${{ hashFiles('rebar.lock', 'c_src/llama.cpp/CMakeLists.txt') }}
          restore-keys: |
            build-ubuntu-24.04-otp-28-
      - name: Run XRef
        run: rebar3 xref
